<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier le Produit - ShopLine Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: var(--light-secondary);
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .form-header {
            background: var(--warning);
            color: var(--white);
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-header h2 {
            margin: 0;
            font-size: 1.3rem;
        }

        .form-header a {
            color: var(--white);
            font-size: 1.5rem;
            text-decoration: none;
            opacity: 0.8;
            transition: var(--transition);
        }

        .form-header a:hover {
            opacity: 1;
        }

        .form-body {
            padding: 32px;
        }

        .product-preview {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--light-secondary);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
        }

        .product-preview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: var(--radius);
        }

        .product-preview-info h4 {
            margin: 0 0 4px 0;
            color: var(--gray-800);
        }

        .product-preview-info p {
            margin: 0;
            color: var(--gray-500);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--gray-700);
        }

        .form-group label .required {
            color: var(--danger);
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: var(--transition);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--warning);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .image-upload-area {
            border: 3px dashed var(--gray-300);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light-secondary);
        }

        .image-upload-area:hover {
            border-color: var(--warning);
            background: #fff8e1;
        }

        .image-upload-area i {
            font-size: 3rem;
            color: var(--gray-400);
            margin-bottom: 16px;
        }

        .image-upload-area p {
            color: var(--gray-500);
            margin: 0;
        }

        .form-footer {
            padding: 20px 32px;
            background: var(--light-secondary);
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-warning {
            background: var(--warning);
            color: var(--white);
        }

        .btn-warning:hover {
            background: #e67e00;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .btn-secondary:hover {
            background: var(--gray-300);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-danger:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>
                <i class="fas fa-edit"></i>
                Modifier le Produit
            </h2>
            <a th:href="@{/admin/produits}">
                <i class="fas fa-times"></i>
            </a>
        </div>

        <form th:action="@{/admin/produits/modifier/{id}(id=${produit.id})}"
              method="post"
              th:object="${produit}"
              enctype="multipart/form-data">

            <!-- 🔥 IMPORTANT : ID caché -->
            <input type="hidden" th:field="*{id}" />

            <div class="form-body">

                <div class="product-preview">
                    <img th:src="@{${produit.imageUrl ?: '/images/valise_baize1.jpeg'}}" alt="Product Image">
                    <div class="product-preview-info">
                        <h4 th:text="${produit.nom}">Nom du produit</h4>
                        <p>ID: <span th:text="${produit.id}">1</span></p>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nom">Nom du produit <span class="required">*</span></label>
                    <input type="text" id="nom" th:field="*{nom}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="prix">Prix (CFA) <span class="required">*</span></label>
                        <input type="number" id="prix" th:field="*{prix}" class="form-control" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="stock">Stock <span class="required">*</span></label>
                        <input type="number" id="stock" th:field="*{stock}" class="form-control" min="0" required>
                    </div>
                </div>

                <!-- 🔥 Catégorie corrigée -->
                <div class="form-group">
                    <label for="categorie">Catégorie</label>
                    <select id="categorie" th:field="*{categorie.id}" class="form-control">
                        <option value="">Sélectionner une catégorie...</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.nom}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="imageFile">Nouvelle image du produit</label>
                    <div class="image-upload-area" onclick="document.getElementById('imageFile').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Cliquez ou glissez une nouvelle image ici</p>
                    </div>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display: none;">
                </div>

                <div class="form-group">
                    <label for="actif">Statut</label>
                    <select id="actif" th:field="*{actif}" class="form-control">
                        <option th:value="true">Actif</option>
                        <option th:value="false">Inactif</option>
                    </select>
                </div>

            </div>

            <div class="form-footer">
                <a th:href="@{/admin/produits}" class="btn btn-secondary">
                    Annuler
                </a>

                <button type="submit" class="btn btn-warning">
                    Enregistrer les modifications
                </button>
            </div>

        </form>
    </div>
</body>
</html>
