<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un Produit - Admin</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }
      .container {
        max-width: 800px;
        margin: 30px auto;
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h2 {
        text-align: center;
        margin-bottom: 20px;
      }
      form label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
      }
      form input,
      form textarea,
      form select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 4px;
        border: 1px solid #ccc;
      }
      form button {
        margin-top: 20px;
        padding: 10px 20px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      form button:hover {
        background: #0056b3;
      }
      .preview-img {
        margin-top: 10px;
        max-width: 200px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Créer un nouveau produit</h2>

      <form
        th:action="@{/templates/produit/save}"
        method="post"
        enctype="multipart/form-data"
        th:object="${produit}"
      >
        <label for="nom">Nom du produit :</label>
        <input
          type="text"
          id="nom"
          th:field="*{nom}"
          placeholder="Nom du produit"
          required
        />

        <label for="description">Description :</label>
        <textarea
          id="description"
          th:field="*{description}"
          rows="4"
          placeholder="Description du produit"
        ></textarea>

        <label for="prix">Prix (€) :</label>
        <input
          type="number"
          id="prix"
          th:field="*{prix}"
          step="0.01"
          placeholder="Ex: 49.99"
          required
        />

        <label for="stock">Stock :</label>
        <input
          type="number"
          id="stock"
          th:field="*{stock}"
          placeholder="Quantité disponible"
        />

        <label for="categorie">Catégorie :</label>
        <select id="categorie" th:field="*{categorie}" required>
          <option
            th:each="cat : ${categories}"
            th:value="${cat}"
            th:text="${cat.name}"
          ></option>
        </select>

        <label for="actif">Actif :</label>
        <select id="actif" th:field="*{actif}" required>
          <option th:value="true">Oui</option>
          <option th:value="false">Non</option>
        </select>

        <label for="imageFile">Image du produit :</label>
        <input
          type="file"
          id="imageFile"
          name="image"
          accept="image/*"
          onchange="previewImage(event)"
        />
        <img
          id="preview"
          class="preview-img"
          th:if="${produit.imageUrl}"
          th:src="@{${produit.imageUrl}}"
        />

        <button type="submit">Créer le produit</button>
      </form>
    </div>

    <script>
      function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function () {
          const output = document.getElementById("preview");
          output.src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
      }
    </script>
  </body>
</html>
