<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des commandes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Liste des commandes</h2>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Total</th>
        <th>Statut</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="cmd : ${commandes}">
        <td th:text="${cmd.id}"></td>
        <td th:text="${cmd.nomClient}"></td>
        <td th:text="${cmd.total}"></td>
        <td th:text="${cmd.statut}"></td>

        <td>
            <button class="btn btn-success"
                    th:onclick="'updateStatut(' + ${cmd.id} + ', \'CONFIRMEE\')'">
                Valider
            </button>

            <button class="btn btn-danger"
                    th:onclick="'updateStatut(' + ${cmd.id} + ', \'ANNULEE\')'">
                Annuler
            </button>

            <button class="btn btn-warning"
                    th:onclick="'updateStatut(' + ${cmd.id} + ', \'EXPEDIEE\')'">
                Expédier
            </button>
        </td>
    </tr>
    </tbody>
</table>

<script>
    function updateStatut(id, statut) {
        fetch('/api/commandes/' + id + '/statut?statut=' + statut, {
            method: 'PATCH'
        })
            .then(res => res.json())
            .then(data => {
                alert("Statut mis à jour !");
                location.reload();
            });
    }
</script>

</body>
</html>
