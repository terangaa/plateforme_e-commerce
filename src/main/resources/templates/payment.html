<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement - ShopLine</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script th:src="@{/js/i18n.js}"></script>
    <style>
        .payment-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 40px 0;
        }

        .payment-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .payment-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .payment-header h1 {
            font-size: 2rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .payment-header h1 i {
            color: #f59e0b;
        }

        .payment-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
        }

        .payment-form {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .form-section {
            margin-bottom: 32px;
        }

        .form-section-title {
            font-size: 1.1rem;
            color: #0f172a;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-section-title i {
            color: #f59e0b;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f59e0b;
            background: white;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }

        .payment-methods-section {
            margin-top: 32px;
        }

        .payment-method-option {
            display: flex;
            align-items: center;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-method-option:hover {
            border-color: #f59e0b;
            background: #fffbeb;
        }

        .payment-method-option.selected {
            border-color: #f59e0b;
            background: #fffbeb;
        }

        .payment-method-option input {
            display: none;
        }

        .payment-radio {
            width: 24px;
            height: 24px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .payment-method-option.selected .payment-radio {
            border-color: #f59e0b;
            background: #f59e0b;
        }

        .payment-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.3s;
        }

        .payment-method-option.selected .payment-radio::after {
            opacity: 1;
        }

        .payment-method-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            color: white;
            font-size: 1.5rem;
        }

        .payment-method-info h4 {
            color: #0f172a;
            margin-bottom: 4px;
        }

        .payment-method-info p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .order-summary {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            height: fit-content;
            position: sticky;
            top: 40px;
        }

        .summary-title {
            font-size: 1.25rem;
            color: #0f172a;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
        }

        .order-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .order-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-image {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            overflow: hidden;
            margin-right: 16px;
            background: #f1f5f9;
        }

        .order-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-info h4 {
            font-size: 0.95rem;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .order-item-info p {
            color: #64748b;
            font-size: 0.85rem;
        }

        .order-item-price {
            font-weight: 600;
            color: #0f172a;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #64748b;
        }

        .summary-row.total {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px solid #f1f5f9;
        }

        .summary-row.total span:last-child {
            color: #f59e0b;
            font-size: 1.5rem;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            color: #16a34a;
            font-size: 0.9rem;
        }

        .secure-badge i {
            font-size: 1rem;
        }

        @media (max-width: 992px) {
            .payment-content {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: static;
                order: -1;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .payment-form {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Shop<span>Line</span></a>
            
            <div class="nav-links">
                <a href="/">Accueil</a>
                <a href="/products">Produits</a>
                <a href="/categories">Catégories</a>
                <a href="/contact">Contact</a>
            </div>
            
            <div class="nav-actions">
                <div class="language-selector">
                    <select id="language-select" onchange="changeLanguage(this.value)">
                        <option value="fr">FR</option>
                        <option value="wo">WO</option>
                        <option value="ff">FF</option>
                        <option value="ar">AR</option>
                    </select>
                </div>
                
                <a href="/cart" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </a>
            </div>
            
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Payment Page -->
    <div class="payment-page">
        <div class="payment-container">
            <div class="payment-header">
                <h1>
                    <i class="fas fa-credit-card"></i>
                    <span data-translate="checkout">Finaliser ma commande</span>
                </h1>
            </div>

            <div id="alert-message" class="alert"></div>

            <div class="payment-content">
                <form class="payment-form" id="payment-form" onsubmit="processPayment(event)">
                    <!-- Client Information -->
                    <div class="form-section">
                        <h3 class="form-section-title">
                            <i class="fas fa-user"></i>
                            <span data-translate="client_info">Informations client</span>
                        </h3>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="prenom">Prénom</label>
                                <input type="text" id="prenom" name="prenom" required>
                            </div>
                            <div class="form-group">
                                <label for="nom">Nom</label>
                                <input type="text" id="nom" name="nom" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="telephone">Téléphone</label>
                            <input type="tel" id="telephone" name="telephone" placeholder="77 XXX XX XX" required>
                        </div>
                    </div>

                    <!-- Delivery Address -->
                    <div class="form-section">
                        <h3 class="form-section-title">
                            <i class="fas fa-map-marker-alt"></i>
                            <span data-translate="delivery_address">Adresse de livraison</span>
                        </h3>
                        
                        <div class="form-group">
                            <label for="adresse">Adresse</label>
                            <input type="text" id="adresse" name="adresse" required>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ville">Ville</label>
                                <input type="text" id="ville" name="ville" required>
                            </div>
                            <div class="form-group">
                                <label for="codePostal">Code postal</label>
                                <input type="text" id="codePostal" name="codePostal">
                            </div>
                        </div>
                    </div>

                    <!-- Payment Method -->
                    <div class="form-section">
                        <h3 class="form-section-title">
                            <i class="fas fa-wallet"></i>
                            <span data-translate="payment_method">Mode de paiement</span>
                        </h3>
                        
                        <label class="payment-method-option" onclick="selectPaymentMethod('wave')">
                            <input type="radio" name="paymentMethod" value="wave">
                            <span class="payment-radio"></span>
                            <div class="payment-method-icon">
                                <i class="fas fa-wallet"></i>
                            </div>
                            <div class="payment-method-info">
                                <h4>Wave (Sénégal/Gambie)</h4>
                                <p>Paiement mobile rapide et sécurisé</p>
                            </div>
                        </label>
                        
                        <label class="payment-method-option" onclick="selectPaymentMethod('orange_money')">
                            <input type="radio" name="paymentMethod" value="orange_money">
                            <span class="payment-radio"></span>
                            <div class="payment-method-icon">
                                <i class="fas fa-mobile-alt"></i>
                            </div>
                            <div class="payment-method-info">
                                <h4>Orange Money</h4>
                                <p>Paiement via Orange Money</p>
                            </div>
                        </label>
                        
                        <label class="payment-method-option" onclick="selectPaymentMethod('free_money')">
                            <input type="radio" name="paymentMethod" value="free_money">
                            <span class="payment-radio"></span>
                            <div class="payment-method-icon">
                                <i class="fas fa-phone-alt"></i>
                            </div>
                            <div class="payment-method-info">
                                <h4>Free Money</h4>
                                <p>Paiement via Free Money</p>
                            </div>
                        </label>
                        
                        <label class="payment-method-option" onclick="selectPaymentMethod('cash')">
                            <input type="radio" name="paymentMethod" value="cash">
                            <span class="payment-radio"></span>
                            <div class="payment-method-icon">
                                <i class="fas fa-money-bill-wave"></i>
                            </div>
                            <div class="payment-method-info">
                                <h4>Paiement à la livraison</h4>
                                <p>Payer en espèces à la réception</p>
                            </div>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        <i class="fas fa-lock"></i>
                        <span data-translate="confirm_payment">Confirmer le paiement</span>
                    </button>

                    <div class="secure-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>Paiement sécurisé</span>
                    </div>
                </form>

                <!-- Order Summary -->
                <div class="order-summary">
                    <h3 class="summary-title">Résumé de la commande</h3>
                    
                    <div class="order-items" id="order-items">
                        <!-- Items will be loaded dynamically -->
                    </div>
                    
                    <div class="summary-row">
                        <span>Sous-total</span>
                        <span id="subtotal">0 CFA</span>
                    </div>
                    <div class="summary-row">
                        <span>Livraison</span>
                        <span>Gratuite</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">0 CFA</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let products = [];
        let selectedPaymentMethod = null;

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch('/api/produits');

                if (!response.ok) throw new Error("Erreur chargement produits");

                products = await response.json();
                renderOrderSummary();
            } catch (error) {
                console.error(error);
                showAlert("Impossible de charger les produits", "error");
            }
        }

        // Load user data
        function loadUserData() {
            const user = JSON.parse(localStorage.getItem('user') || 'null');

            if (!user) return;

            document.getElementById('prenom').value = user.prenom || '';
            document.getElementById('nom').value = user.nom || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('telephone').value = user.telephone || '';
            document.getElementById('ville').value = user.ville || '';
            document.getElementById('adresse').value = user.adresse || '';
        }

        // Render order summary
        function renderOrderSummary() {
            const orderItems = document.getElementById('order-items');
            let total = 0;

            if (!cart.length) {
                orderItems.innerHTML = "<p>Panier vide</p>";
                return;
            }

            orderItems.innerHTML = cart.map(item => {
                const product = products.find(p => p.id === item.id);
                if (!product) return '';

                const itemTotal = (product.prix || 0) * item.quantity;
                total += itemTotal;

                return `
            <div class="order-item">
                <div class="order-item-image">
                    <img src="${product.imageUrl || '/images/default.jpg'}">
                </div>
                <div class="order-item-info">
                    <h4>${product.nom}</h4>
                    <p>Qty: ${item.quantity}</p>
                </div>
                <span>${itemTotal.toLocaleString()} CFA</span>
            </div>
        `;
            }).join('');

            document.getElementById('subtotal').textContent = total.toLocaleString() + ' CFA';
            document.getElementById('total').textContent = total.toLocaleString() + ' CFA';
        }

        // Select payment method
        function selectPaymentMethod(method, el) {
            selectedPaymentMethod = method;

            document.querySelectorAll('.payment-method-option')
                .forEach(opt => opt.classList.remove('selected'));

            el.classList.add('selected');
        }

        // Process payment
        async function processPayment(event) {
            event.preventDefault();

            if (!cart.length) {
                showAlert("Panier vide", "error");
                return;
            }

            if (!selectedPaymentMethod) {
                showAlert("Choisir un mode de paiement", "error");
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = "Traitement...";

            const user = JSON.parse(localStorage.getItem('user') || 'null');

            const orderData = {
                clientId: user?.id || null,
                clientNom: document.getElementById('nom').value,
                clientPrenom: document.getElementById('prenom').value,
                clientEmail: document.getElementById('email').value,
                clientTelephone: document.getElementById('telephone').value,
                adresse: document.getElementById('adresse').value,
                ville: document.getElementById('ville').value,
                codePostal: document.getElementById('codePostal').value,
                produits: cart.map(item => ({
                    produitId: item.id,
                    quantite: item.quantity
                }))
            };

            try {
                const response = await fetch('/api/commandes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || "Erreur commande");
                }

                // 🔥 lancer paiement après création commande
                await initPayment(result.orderId);

            } catch (error) {
                console.error(error);
                showAlert(error.message, "error");
                btn.disabled = false;
                btn.innerHTML = "Confirmer paiement";
            }
        }

        // Init payment
        async function initPayment(orderId) {
            try {
                const response = await fetch(`/api/payment/initiate/${orderId}?method=${selectedPaymentMethod}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (!response.ok) throw new Error(result.message);

                window.location.href = result.checkoutUrl;

            } catch (error) {
                showAlert("Erreur paiement: " + error.message, "error");
            }
        }

        // Alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert-message');
            alert.textContent = message;
            alert.className = "alert " + type;
            alert.style.display = "block";

            setTimeout(() => alert.style.display = "none", 5000);
        }

        // Cart count
        function updateCartCount() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cart-count').textContent = count;
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            loadUserData();
            updateCartCount();
        });
    </script>
</body>
</html>
