<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un produit - ShopLine</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #ff6a00;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            border-color: #ff6a00;
            outline: none;
            box-shadow: 0 0 5px rgba(255,106,0,0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .image-upload input[type="file"] {
            padding: 10px;
        }

        .image-preview {
            margin-top: 10px;
            text-align: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }

        .btn-submit {
            padding: 15px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        @media(max-width: 600px) {
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ajouter un produit</h2>
    <form th:action="@{/produits/save}" th:object="${produit}" method="post" enctype="multipart/form-data">

        <div class="form-group">
            <label for="name">Nom du produit :</label>
            <input type="text" id="name" th:field="*{name}" placeholder="Nom du produit" required>
        </div>

        <div class="form-group">
            <label for="description">Description :</label>
            <textarea id="description" th:field="*{description}" placeholder="Description du produit"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="prix">Prix (€) :</label>
                <input type="number" step="0.01" id="prix" th:field="*{prix}" placeholder="Prix" required>
            </div>
            <div class="form-group">
                <label for="stock">Stock :</label>
                <input type="number" id="stock" th:field="*{stock}" placeholder="Stock disponible">
            </div>
        </div>

        <div class="form-group">
            <label for="categorie">Catégorie :</label>
            <select id="categorie" th:field="*{categorie}" required>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
        </div>

        <div class="form-group image-upload">
            <label for="image">Image du produit :</label>
            <input type="file" id="image" name="image" accept="image/*" onchange="previewImage(event)">
            <div class="image-preview" id="imagePreview">
                <span>Aucune image sélectionnée</span>
                <img src="" alt="Preview" style="display:none;">
            </div>
        </div>

        <div class="form-group">
            <label for="actif">Actif :</label>
            <input type="checkbox" id="actif" th:field="*{actif}" checked>
        </div>

        <div class="form-group">
            <button type="submit" class="btn-submit"><i class="fas fa-plus"></i> Ajouter le produit</button>
        </div>

    </form>
</div>

<script>
    function previewImage(event) {
        const preview = document.getElementById('imagePreview');
        const img = preview.querySelector('img');
        const span = preview.querySelector('span');

        if(event.target.files && event.target.files[0]){
            const reader = new FileReader();
            reader.onload = function(e){
                img.src = e.target.result;
                img.style.display = 'block';
                span.style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        } else {
            img.style.display = 'none';
            span.style.display = 'block';
        }
    }
</script>

</body>
</html>
